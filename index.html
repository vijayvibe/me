                }

        const App = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [activeSection, setActiveSection] = useState('home');
            const [copiedId, setCopiedId] = useState(null);
            
            // Carousel State for Press Section
            const [visibleCount, setVisibleCount] = useState(3);
            const [pressIndex, setPressIndex] = useState(3); // will initialize to visibleCount
            const [isPaused, setIsPaused] = useState(false);
            const [isTransitionEnabled, setIsTransitionEnabled] = useState(true);
            
            // Image Modal State
            const [selectedImage, setSelectedImage] = useState(null);
            const [showModal, setShowModal] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['home', 'about', 'experience', 'boards', 'awards', 'press', 'speaking', 'judging', 'research', 'skills'];
                    const current = sections.find(section => {
                        const element = document.getElementById(section);
                        if (element) {
                            const rect = element.getBoundingClientRect();
                            return rect.top <= 100 && rect.bottom >= 100;
                        }
                        return false;
                    });
                    if (current) setActiveSection(current);
                };
                
                const handleResize = () => {
                    if (window.innerWidth < 640) setVisibleCount(1);
                    else if (window.innerWidth < 1024) setVisibleCount(2);
                    else setVisibleCount(3);
                };

                window.addEventListener('scroll', handleScroll);
                window.addEventListener('resize', handleResize);
                handleResize(); 
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('resize', handleResize);
                };
            }, []);

            useEffect(() => {
                if (isPaused) return;
                const timer = setInterval(() => {
                    nextPress();
                }, 2000); // Auto advance every 2 seconds
                return () => clearInterval(timer);
            }, [pressIndex, isPaused, DATA.press.length, visibleCount]);

            // For seamless looping, clone slides at both ends
            const getPressItems = () => {
                const pre = DATA.press.slice(-visibleCount);
                const post = DATA.press.slice(0, visibleCount);
                return [...pre, ...DATA.press, ...post];
            };

            const pressItems = getPressItems();

            // Initialize pressIndex to visibleCount (start at first real slide)
            useEffect(() => {
                setPressIndex(visibleCount);
            }, [visibleCount]);

            const nextPress = () => {
                setIsTransitionEnabled(true);
                setPressIndex((prev) => prev + 1);
            };

            const prevPress = () => {
                setIsTransitionEnabled(true);
                setPressIndex((prev) => prev - 1);
            };

            const handleTransitionEnd = () => {
                const realLength = DATA.press.length;
                if (pressIndex >= realLength + visibleCount) {
                    // jumped into cloned-post region; reset to equivalent real index
                    setIsTransitionEnabled(false);
                    setPressIndex((prev) => prev - realLength);
                    // re-enable transition on next tick
                    setTimeout(() => setIsTransitionEnabled(true), 20);
                }
                if (pressIndex < visibleCount) {
                    // jumped into cloned-pre region; reset to equivalent real index
                    setIsTransitionEnabled(false);
                    setPressIndex((prev) => prev + realLength);
                    setTimeout(() => setIsTransitionEnabled(true), 20);
                }
            };

            const handleCopy = (text, id) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            };

            const SectionHeading = ({ children, icon }) => (
                <div className="flex items-center gap-4 mb-12">
                    <div className="p-3 rounded-2xl bg-blue-600/10 text-blue-600 dark:text-blue-400 flex items-center justify-center">

                    </div>
                    <h2 className="text-3xl font-bold tracking-tight text-slate-900 dark:text-white uppercase">{children}</h2>
                </div>
            );

            const handleImageClick = (imageSrc) => {
                setSelectedImage(imageSrc);
                setShowModal(true);
            };

            const closeModal = () => {
                setShowModal(false);
                setTimeout(() => setSelectedImage(null), 300);
            };

                                                    <h4 className="font-black text-2xl uppercase leading-none">{item.org}</h4>
                                                    <div className="text-xs font-bold text-blue-600 dark:text-blue-400 group-hover:text-white uppercase mt-2">{item.role}</div>
                                                </div>
                                                <div className="text-xs font-bold opacity-60 uppercase">{item.detail}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid md:grid-cols-2 gap-12 mb-16">
                                    <div>
                                        <div className="flex items-center gap-2 text-blue-600 font-black uppercase text-[12px] tracking-[0.3em] mb-6"><Icon name="flag" size={14} /> Competition Judging</div>
                                        <div className="space-y-4">
                                            {DATA.judging.competitions.map((item, idx) => (
                                                <div key={idx} className="p-6 bg-white dark:bg-white/[0.03] rounded-[2rem] border border-slate-100 dark:border-white/5 flex items-center gap-4 group">
                                                    <div className="p-3 bg-blue-500/10 rounded-xl text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                                        <Icon name="scale" size={18} />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-lg leading-tight uppercase text-slate-900 dark:text-white">{item.org}</h4>
                                                        <div className="text-[10px] font-bold text-slate-500 uppercase">{item.detail}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex items-center gap-2 text-blue-600 font-black uppercase text-[12px] tracking-[0.3em] mb-6"><Icon name="rocket" size={14} /> Hackathon Judging</div>
                                        <div className="space-y-4">
                                            {DATA.judging.hackathons.map((item, idx) => (
                                                <div key={idx} className="p-6 bg-white dark:bg-white/[0.03] rounded-[2rem] border border-slate-100 dark:border-white/5 flex items-center gap-4 group">
                                                    <div className="p-3 bg-indigo-500/10 rounded-xl text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                                        <Icon name="cpu" size={18} />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-lg leading-tight uppercase text-slate-900 dark:text-white">{item.org}</h4>
                                                        <div className="text-[10px] font-bold text-slate-500 uppercase">{item.detail}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="mb-16">
                                    <div className="flex items-center gap-2 text-blue-600 font-black uppercase text-[12px] tracking-[0.3em] mb-6"><Icon name="pen-tool" size={14} /> Journal Review Panel</div>
                                    <div className="grid md:grid-cols-3 gap-4">
                                        {DATA.judging.journals.map((item, idx) => (
                                            <div key={idx} className="p-6 bg-white dark:bg-white/[0.03] rounded-[2rem] border border-slate-100 dark:border-white/5 shadow-sm hover:border-blue-500 transition-all">
                                                <h4 className="font-bold text-lg leading-tight text-slate-900 dark:text-white">{item.org}</h4>
                                                <div className="text-[10px] font-black text-blue-600 uppercase tracking-widest italic mt-2">{item.detail}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="flex items-center gap-2 text-blue-600 font-black uppercase text-[12px] tracking-[0.3em] mb-6"><Icon name="calendar" size={14} /> Conference Peer Review</div>
                                    <div className="grid md:grid-cols-4 gap-4">
                                        {DATA.judging.peerReview.map((item, idx) => (
                                            <div key={idx} className="p-6 bg-white dark:bg-white/[0.03] rounded-[2rem] border border-slate-100 dark:border-white/5 shadow-sm hover:border-blue-500 transition-all">
                                                <h4 className="font-bold text-sm leading-tight uppercase text-slate-900 dark:text-white">{item.org}</h4>
                                                <div className="text-[9px] font-bold text-slate-500 uppercase mt-1 italic">{item.detail}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="research" className="py-32 px-6 border-t border-slate-100 dark:border-white/5 bg-white dark:bg-[#0a0a0c]">
                            <div className="max-w-7xl mx-auto">
                                <SectionHeading icon="book-open">Publications</SectionHeading>
                                <div className="space-y-6">
                                    {DATA.publications.map((pub, idx) => (
                                        <div key={idx} className="bg-slate-100/40 dark:bg-white/[0.03] p-8 rounded-[2.5rem] border border-slate-200 dark:border-white/10 flex flex-col md:flex-row justify-between items-start md:items-center gap-8 group hover:shadow-2xl hover:border-blue-500/30 transition-all duration-300 shadow-sm">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-4"><span className="text-[10px] font-bold bg-blue-600 text-white px-2 py-0.5 rounded uppercase tracking-tighter">Peer Reviewed</span><span className="text-xs font-bold text-slate-400 uppercase tracking-widest">{pub.date} • {pub.journal}</span></div>
                                                <h4 className="text-xl md:text-2xl font-black mb-4 text-slate-900 dark:text-white group-hover:text-blue-600 transition-colors uppercase leading-tight">{pub.title}</h4>
                                                <div className="text-xs font-mono text-slate-500 flex items-center gap-2 uppercase tracking-widest"><Icon name="hash" size={12} className="text-blue-600" /> DOI: {pub.doi}</div>
                                            </div>
                                            <div className="flex gap-3 w-full md:w-auto">
                                                <button onClick={() => handleCopy(pub.cite, idx)} className="flex-1 md:flex-none px-8 py-3 border border-slate-200 dark:border-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white dark:hover:bg-blue-600 hover:text-blue-600 dark:hover:text-white transition-all flex items-center justify-center gap-2 text-slate-500">
                                                    {copiedId === idx ? <Icon name="clipboard-check" size={16} className="text-green-500" /> : <Icon name="quote" size={16} />}{copiedId === idx ? "Copied" : "Cite"}
                                                </button>
                                                <a href={pub.doi ? (pub.doi.startsWith('http') ? pub.doi : `https://doi.org/${pub.doi}`) : '#'} target="_blank" rel="noreferrer" className="p-4 bg-slate-900 dark:bg-white text-white dark:text-black rounded-2xl hover:bg-blue-600 dark:hover:bg-blue-500 transition-colors shadow-lg"><Icon name="external-link" size={20} /></a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <footer id="skills" className="py-32 px-6 bg-slate-50 dark:bg-[#050505] border-t border-slate-100 dark:border-white/5">
                            <div className="max-w-7xl mx-auto mb-20">
                                <SectionHeading icon="cpu">Technical Proficiency</SectionHeading>
                                <div className="grid md:grid-cols-3 gap-12">
                                    <div><h4 className="text-xs font-black text-slate-500 mb-6 uppercase tracking-[0.3em]">Engineering & CAE</h4><div className="flex flex-wrap gap-2">{DATA.skills.engineering.map(s => (<span key={s} className="px-4 py-2 rounded-xl bg-white dark:bg-blue-900/20 text-slate-700 dark:text-blue-300 text-xs font-bold uppercase border border-slate-200 dark:border-transparent tracking-tighter">{s}</span>))}</div></div>
                                    <div><h4 className="text-xs font-black text-slate-500 mb-6 uppercase tracking-[0.3em]">AI & Cloud Tech</h4><div className="flex flex-wrap gap-2">{DATA.skills.tech.map(s => (<span key={s} className="px-4 py-2 rounded-xl bg-white dark:bg-indigo-900/20 text-slate-700 dark:text-indigo-300 text-xs font-bold uppercase border border-slate-200 dark:border-transparent tracking-tighter">{s}</span>))}</div></div>
                                    <div><h4 className="text-xs font-black text-slate-500 mb-6 uppercase tracking-[0.3em]">Strategic Leadership</h4><div className="flex flex-wrap gap-2">{DATA.skills.management.map(s => (<span key={s} className="px-4 py-2 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-bold uppercase border border-slate-200 dark:border-transparent tracking-tighter">{s}</span>))}</div></div>
                                </div>
                            </div>
                            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 pt-12 border-t border-slate-100 dark:border-white/5">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">V</div>
                                    <div className="font-black text-xl tracking-tighter uppercase text-slate-900 dark:text-white">VIJAYACHANDAR <span className="text-blue-600">SANIKAL</span></div>
                                </div>
                                <div className="flex gap-6">
                                    <a href="#" className="p-3 bg-white dark:bg-[#1a1a1c] rounded-xl hover:bg-blue-600 hover:text-white transition-all text-slate-500 shadow-sm border border-slate-100 dark:border-transparent"><Icon name="linkedin" size={22} /></a>
                                    <a href="#" className="p-3 bg-white dark:bg-[#1a1a1c] rounded-xl hover:bg-blue-600 hover:text-white transition-all text-slate-500 shadow-sm border border-slate-100 dark:border-transparent"><Icon name="mail" size={22} /></a>
                                </div>
                                <div className="text-[10px] font-black uppercase text-slate-500 tracking-widest">© 2026 SENIOR MEMBER IEEE</div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
